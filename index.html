<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쉴물가 모임 보고서</title>

  <!-- PWA / 홈화면 추가 -->
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="쉴물가 보고서" />
  <link rel="apple-touch-icon" sizes="180x180" href="https://22changjoo.github.io/pastoral-report/apple-touch-icon.png" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
      background: #f0f4f0;
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      overflow: hidden;
    }

    .header {
      background: #2E7D32;
      color: white;
      border-radius: 12px 12px 0 0;
      padding: 20px 32px 24px;
      text-align: center;
    }

    .header-logo { margin-bottom: 10px; }
    .header-logo img { height: 20px; width: auto; display: inline-block; }

    .header-text h1 { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
    .header-text p { font-size: 13px; opacity: 0.85; }

    @media (max-width: 480px) {
      .header { padding: 14px 20px 18px; }
      .header-text h1 { font-size: 22px; }
    }

    .form-card {
      background: white;
      border-radius: 0 0 12px 12px;
      padding: 32px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }

    @media (max-width: 480px) {
      .form-card { padding: 24px 16px; }
    }

    .section-divider {
      border: none;
      border-top: 2px solid #E8F5E9;
      margin: 24px 0;
    }

    /* 2열 그리드 */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 38px;
    }

    @media (max-width: 540px) {
      .form-row { grid-template-columns: 1fr; gap: 0; margin-bottom: 0; }
      .form-row .form-group { margin-bottom: 38px; }
    }

    .form-group { margin-bottom: 38px; }
    .form-row .form-group { margin-bottom: 0; }

    label {
      display: block;
      font-size: 15px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    label .required { color: #e53935; margin-left: 2px; }

    input[type="date"],
    input[type="text"],
    select,
    textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      color: #333;
      background: #fafafa;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    input[type="date"] { display: block; max-width: 100%; }

    input:focus, select:focus, textarea:focus {
      border-color: #2E7D32;
      box-shadow: 0 0 0 3px rgba(46,125,50,0.12);
      background: white;
    }

    input.error, select.error, textarea.error { border-color: #e53935; }

    textarea {
      resize: vertical;
      min-height: 90px;
      line-height: 1.6;
    }

    /* 체크박스 칩 */
    .chip-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }

    .chip-label {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: 1.5px solid #ddd;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      color: #555;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
      background: #fafafa;
    }

    .chip-label input[type="checkbox"] {
      display: none;
    }

    .chip-label:hover {
      border-color: #2E7D32;
      color: #2E7D32;
      background: #f1f8f1;
    }

    .chip-label.selected {
      background: #2E7D32;
      border-color: #2E7D32;
      color: white;
    }

    .chip-hint {
      font-size: 12px;
      color: #888;
      margin-top: 8px;
    }

    /* 기도제목 */
    .prayer-box {
      border: 1.5px solid #FFCDD2;
      border-radius: 8px;
      padding: 11px 14px;
      background: #FFF8F8;
      width: 100%;
      min-height: 90px;
      font-size: 15px;
      font-family: inherit;
      color: #333;
      resize: vertical;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      line-height: 1.6;
    }

    .prayer-box:focus {
      border-color: #e53935;
      box-shadow: 0 0 0 3px rgba(229,57,53,0.1);
      background: white;
    }

    .prayer-label { color: #C62828 !important; }

    /* 제출 버튼 */
    .submit-btn {
      width: 100%;
      padding: 16px;
      background: #2E7D32;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 28px;
      font-family: inherit;
      transition: background 0.2s;
      letter-spacing: 0.03em;
    }

    .submit-btn:hover { background: #1B5E20; }
    .submit-btn:disabled { background: #aaa; cursor: not-allowed; }

    /* 성공 화면 */
    .success-screen {
      display: none;
      text-align: center;
      padding: 48px 24px;
    }

    .success-screen .icon { font-size: 64px; margin-bottom: 16px; }
    .success-screen h2 { color: #2E7D32; margin-bottom: 8px; }
    .success-screen p { color: #666; font-size: 14px; margin-bottom: 24px; line-height: 1.7; }
    .success-screen button {
      background: #2E7D32;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      font-family: inherit;
    }

    /* 토스트 */
    .toast {
      display: none;
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 14px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      z-index: 1000;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      max-width: 90vw;
      text-align: center;
    }

    .toast.success { background: #2E7D32; }
    .toast.error { background: #c62828; }

    .hint { font-size: 12px; color: #888; margin-top: 5px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-logo">
        <img src="https://igodswill.org/wp-content/uploads/2025/01/logo02.png" alt="높은뜻푸른교회 로고" />
      </div>
      <div class="header-text">
        <h1>쉴물가 모임 보고서</h1>
        <p>쉴물가 모임 후 보고서를 제출해 주세요</p>
      </div>
    </div>

    <div class="form-card">
      <!-- 성공 화면 -->
      <div class="success-screen" id="successScreen">
        <div class="icon">✅</div>
        <h2>보고서가 제출되었습니다!</h2>
        <p>담당 목사님께 알림 메일이 발송되었습니다.<br>수고하셨습니다 🙏</p>
        <button onclick="resetForm()">새 보고서 작성</button>
      </div>

      <!-- 폼 -->
      <form id="reportForm">

        <!-- 초장 -->
        <div class="form-group">
          <label for="choJang">초장 <span class="required">*</span></label>
          <select id="choJang" required>
            <option value="">선택하세요</option>
            <option value="1초장">1초장</option>
            <option value="2/3초장">2/3초장</option>
            <option value="4초장">4초장</option>
            <option value="5초장">5초장</option>
            <option value="6초장">6초장</option>
          </select>
        </div>

        <!-- 쉴물가 -->
        <div class="form-group">
          <label for="shilMulGa">쉴물가(또는 목자이름) <span class="required">*</span></label>
          <input type="text" id="shilMulGa" placeholder="예: ○○○ 쉴물가" required />
        </div>

        <!-- 모임 날짜 -->
        <div class="form-group">
          <label for="meetingDate">모임 날짜 <span class="required">*</span></label>
          <input type="date" id="meetingDate" required />
        </div>

        <!-- 모임 장소 -->
        <div class="form-group">
          <label for="meetingPlace">모임 장소 <span class="required">*</span></label>
          <input type="text" id="meetingPlace" placeholder="예: 0-0반 교실, 양덕관" required />
        </div>

        <hr class="section-divider" />

        <!-- 참석자 -->
        <div class="form-group">
          <label for="attendees">참석자 <span class="required">*</span></label>
          <textarea id="attendees" placeholder="예) 홍길동, 김철수, 이영희" required></textarea>
          <div class="hint">쉼표(,)로 구분하여 입력하면 인원수가 자동 계산됩니다</div>
        </div>

        <hr class="section-divider" />

        <!-- 불참자 및 사유 -->
        <div class="form-group">
          <label for="absentees">불참자 및 사유</label>
          <textarea id="absentees" placeholder="예) 김○○ - 출장&#10;이○○ - 건강 문제&#10;(없으면 비워두세요)"></textarea>
        </div>

        <hr class="section-divider" />

        <!-- 모임 내용 (칩) -->
        <div class="form-group">
          <label>모임 내용 <span class="required">*</span></label>
          <div class="chip-group" id="contentChips">
            <label class="chip-label" onclick="toggleChip(this)">
              <input type="checkbox" value="말씀나눔" /> 말씀나눔
            </label>
            <label class="chip-label" onclick="toggleChip(this)">
              <input type="checkbox" value="기도제목나눔" /> 기도제목나눔
            </label>
            <label class="chip-label" onclick="toggleChip(this)">
              <input type="checkbox" value="교제" /> 교제
            </label>
            <label class="chip-label" onclick="toggleChip(this)">
              <input type="checkbox" value="식사" /> 식사
            </label>
            <label class="chip-label" onclick="toggleChip(this)">
              <input type="checkbox" value="기타" /> 기타
            </label>
          </div>
          <div class="chip-hint">여러 항목을 중복 선택할 수 있습니다</div>
        </div>

        <hr class="section-divider" />

        <!-- 오늘 모임은 어땠나요? -->
        <div class="form-group">
          <label for="evaluation">오늘 모임은 어땠나요?</label>
          <textarea id="evaluation" placeholder="모임 후 느낀 점이나 짧은 소감을&#10;편하게 적어주세요&#10;(없으면 비워두세요)"></textarea>
        </div>

        <hr class="section-divider" />

        <!-- 기도제목 -->
        <div class="form-group">
          <label for="prayerRequest" class="prayer-label">🙏 기도제목</label>
          <textarea class="prayer-box" id="prayerRequest" placeholder="기도제목을 적어주세요&#10;(없으면 비워두세요)"></textarea>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">보고서 제출하기</button>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // 입력 시 키보드에 가리지 않도록 스크롤
    document.addEventListener('focusin', function(e) {
      const el = e.target;
      if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.tagName === 'SELECT') {
        setTimeout(function() {
          el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 350);
      }
    });

    // 오늘 날짜 기본값
    document.getElementById('meetingDate').value = new Date().toISOString().split('T')[0];

    // 칩 토글
    function toggleChip(label) {
      label.classList.toggle('selected');
      const cb = label.querySelector('input[type="checkbox"]');
      cb.checked = label.classList.contains('selected');
    }

    // 선택된 모임 내용 가져오기
    function getSelectedContent() {
      const checked = document.querySelectorAll('#contentChips input[type="checkbox"]:checked');
      return Array.from(checked).map(cb => cb.value).join(', ');
    }

    // 참석자 파싱
    function parseAttendees(text) {
      return text.split(',').map(s => s.trim()).filter(Boolean);
    }

    function showToast(msg, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = `toast ${type}`;
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 3500);
    }

    function resetForm() {
      document.getElementById('reportForm').reset();
      document.getElementById('meetingDate').value = new Date().toISOString().split('T')[0];
      document.querySelectorAll('.chip-label').forEach(l => l.classList.remove('selected'));
      document.getElementById('successScreen').style.display = 'none';
      document.getElementById('reportForm').style.display = 'block';
    }

    document.getElementById('reportForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const attendeesRaw = document.getElementById('attendees').value.trim();
      const attendeeList = parseAttendees(attendeesRaw);
      if (attendeeList.length === 0) {
        showToast('참석자를 한 명 이상 입력해 주세요.', 'error');
        return;
      }

      const content = getSelectedContent();
      if (!content) {
        showToast('모임 내용을 한 가지 이상 선택해 주세요.', 'error');
        return;
      }

      const formData = {
        meetingDate: document.getElementById('meetingDate').value,
        choJang: document.getElementById('choJang').value,
        shilMulGa: document.getElementById('shilMulGa').value.trim(),
        meetingPlace: document.getElementById('meetingPlace').value.trim(),
        attendeeCount: attendeeList.length,
        attendees: attendeeList.join(', '),
        absentees: document.getElementById('absentees').value.trim(),
        content: content,
        evaluation: document.getElementById('evaluation').value.trim(),
        prayerRequest: document.getElementById('prayerRequest').value.trim(),
      };

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = '제출 중...';

      google.script.run
        .withSuccessHandler(function(result) {
          btn.disabled = false;
          btn.textContent = '보고서 제출하기';
          if (result.success) {
            document.getElementById('reportForm').style.display = 'none';
            document.getElementById('successScreen').style.display = 'block';
          } else {
            showToast('오류: ' + result.message, 'error');
          }
        })
        .withFailureHandler(function(err) {
          btn.disabled = false;
          btn.textContent = '보고서 제출하기';
          showToast('제출 실패: ' + err.message, 'error');
        })
        .submitReport(formData);
    });
  </script>
</body>
</html>
