<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>목자보고서 대시보드 — 높은뜻푸른교회</title>

  <!-- PWA / 홈화면 추가 -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="목자 대시보드" />
  <link rel="apple-touch-icon" sizes="180x180" href="https://22changjoo.github.io/pastoral-report/admin-touch-icon.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <style>
    :root {
      --green: #2E7D32;
      --green-dark: #1B5E20;
      --green-light: #E8F5E9;
      --green-mid: #C8E6C9;
      --border: #e8e8e8;
      --text: #1a1a1a;
      --text-sub: #888;
      --bg: #f4f6f4;
      --card: white;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── 로그인 화면 ── */
    #loginScreen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 50%, #388E3C 100%);
    }

    .login-box {
      background: white;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
      margin: 20px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    .login-box img { height: 32px; margin-bottom: 16px; }
    .login-box h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .login-box p { font-size: 13px; color: var(--text-sub); margin-bottom: 28px; }

    .login-form label { display: block; text-align: left; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 5px; }
    .login-form input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.15s;
    }
    .login-form input:focus { border-color: var(--green); }

    .login-btn {
      width: 100%;
      padding: 13px;
      background: var(--green);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.15s;
    }
    .login-btn:hover { background: var(--green-dark); }

    .login-error {
      font-size: 13px;
      color: #c62828;
      margin-top: 10px;
      display: none;
    }

    /* ── 대시보드 ── */
    #dashboard { display: none; }

    .topbar {
      background: var(--green);
      color: white;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-left img { height: 20px; }
    .topbar-left h1 { font-size: 16px; font-weight: 700; }

    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .user-badge {
      font-size: 12px;
      background: rgba(255,255,255,0.15);
      padding: 4px 10px;
      border-radius: 12px;
    }
    .logout-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.4);
      color: white;
      padding: 4px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
    }

    .main { padding: 24px; max-width: 1100px; margin: 0 auto; }

    /* ── 통계 카드 ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .stat-label { font-size: 11px; font-weight: 600; color: var(--text-sub); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 6px; }
    .stat-value { font-size: 28px; font-weight: 800; color: var(--green-dark); line-height: 1; }
    .stat-sub { font-size: 11px; color: var(--text-sub); margin-top: 4px; }

    /* ── 필터 바 ── */
    .filter-bar {
      background: white;
      border-radius: 14px;
      padding: 12px 16px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
    }

    .filter-row {
      flex: 1;
      min-width: 120px;
    }

    .filter-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 0;
    }

    .filter-field label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-sub);
      letter-spacing: 0.04em;
    }

    .filter-date-row {
      display: flex;
      flex-direction: row;
      align-items: flex-end;
      gap: 8px;
      flex: 2;
      min-width: 240px;
    }

    .filter-date-sep { 
      padding-bottom: 10px;
      color: var(--text-sub);
      font-weight: 500;
    }

    .filter-bar select, .filter-bar input {
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      background: #fafafa;
      transition: border-color 0.15s;
      width: 100%;
      min-width: 0;
      max-width: 100%;
      box-sizing: border-box;
      -webkit-appearance: none;
      appearance: none;
    }

    input[type="date"] {
      -webkit-appearance: none;
      appearance: none;
      display: block;
      width: 100%;
      max-width: 100%;
    }
    .filter-bar select:focus, .filter-bar input:focus { border-color: var(--green); }

    .filter-actions {
      display: flex;
      gap: 8px;
      flex: 1;
      min-width: 140px;
    }

    .filter-btn {
      flex: 1;
      padding: 10px 16px;
      background: var(--green);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
    }

    .filter-reset {
      padding: 10px 16px;
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      color: var(--text-sub);
      font-family: inherit;
      cursor: pointer;
    }

    /* ── 보고서 목록 ── */
    .reports-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .reports-header h2 { font-size: 15px; font-weight: 700; }
    .reports-count { font-size: 13px; color: var(--text-sub); }

    .report-card {
      background: white;
      border-radius: 14px;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      overflow: hidden;
      cursor: pointer;
      transition: box-shadow 0.15s;
    }
    .report-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }

    .report-card-header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .report-card-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }

    .chojang-badge {
      flex-shrink: 0;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
    }

    .report-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .report-meta { font-size: 12px; color: var(--text-sub); margin-top: 2px; }

    .report-card-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .report-date { font-size: 12px; color: var(--text-sub); }
    .expand-arrow { font-size: 14px; color: #bbb; transition: transform 0.2s; }
    .report-card.open .expand-arrow { transform: rotate(180deg); }

    .report-card-body {
      display: none;
      padding: 0 20px 16px;
      border-top: 1px solid #f5f5f5;
    }
    .report-card.open .report-card-body { display: block; }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
    }

    .detail-item label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-sub);
      display: block;
      margin-bottom: 4px;
    }
    .detail-item p {
      font-size: 14px;
      color: var(--text);
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .detail-item.full { grid-column: 1 / -1; }
    .detail-item.prayer p { color: #c62828; }

    .content-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .content-chip {
      padding: 4px 10px;
      background: var(--green-light);
      border-radius: 12px;
      font-size: 12px;
      color: var(--green-dark);
      font-weight: 600;
    }

    /* ── 로딩 / 빈 화면 ── */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-sub);
    }
    .loading .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-sub);
      font-size: 14px;
    }

    /* ── 반응형 ── */
    @media (max-width: 600px) {
      .main { padding: 12px; }
      .topbar { padding: 0 16px; }
      .topbar-left h1 { font-size: 14px; }
      .user-badge { display: none; }
      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- 로그인 화면 -->
  <div id="loginScreen">
    <div class="login-box">
      <img src="https://igodswill.org/wp-content/uploads/2025/01/logo02.png" alt="높은뜻푸른교회" />
      <h1>목자보고서 대시보드</h1>
      <p>목사님 전용 조회 시스템입니다</p>
      <div class="login-form">
        <label>비밀번호</label>
        <input type="password" id="passwordInput" placeholder="비밀번호를 입력하세요" onkeydown="if(event.key==='Enter') doLogin()" />
        <button class="login-btn" onclick="doLogin()">로그인</button>
        <p class="login-error" id="loginError">비밀번호가 올바르지 않습니다.</p>
      </div>
    </div>
  </div>

  <!-- 대시보드 -->
  <div id="dashboard">
    <div class="topbar">
      <div class="topbar-left">
        <img src="https://igodswill.org/wp-content/uploads/2025/01/logo02.png" alt="" />
        <h1>목자보고서 대시보드</h1>
      </div>
      <div class="topbar-right">
        <span class="user-badge">높은뜻푸른교회</span>
        <button class="logout-btn" onclick="doLogout()">로그아웃</button>
      </div>
    </div>

    <div class="main">
      <!-- 통계 -->
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="stat-label">📅 이번 달 보고서</div>
          <div class="stat-value" id="statThisMonth">—</div>
          <div class="stat-sub" id="statMonthLabel">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">🔥 이번 주 보고서</div>
          <div class="stat-value" id="statThisWeek">—</div>
          <div class="stat-sub">최근 7일</div>
        </div>
      </div>

      <!-- 필터 -->
      <div class="filter-bar">
        <div class="filter-row">
          <div class="filter-field">
            <label>초장</label>
            <select id="filterChoJang">
              <option value="">전체 초장</option>
              <option value="1초장">1초장</option>
              <option value="2/3초장">2/3초장</option>
              <option value="4초장">4초장</option>
              <option value="5초장">5초장</option>
              <option value="6초장">6초장</option>
            </select>
          </div>
        </div>
        <div class="filter-date-row">
          <div class="filter-field">
            <label>시작일</label>
            <input type="date" id="filterFrom" />
          </div>
          <span class="filter-date-sep">~</span>
          <div class="filter-field">
            <label>종료일</label>
            <input type="date" id="filterTo" />
          </div>
        </div>
        <div class="filter-actions">
          <button class="filter-btn" onclick="applyFilter()">조회</button>
          <button class="filter-reset" onclick="resetFilter()">초기화</button>
        </div>
      </div>

      <!-- 보고서 목록 -->
      <div class="reports-header">
        <h2>보고서 목록</h2>
        <span class="reports-count" id="reportsCount"></span>
      </div>
      <div id="reportsList">
        <div class="loading"><div class="spinner"></div>불러오는 중...</div>
      </div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzQjw9EIe9nbpmBXNl67vX03nFXyBVo4TYevBAsXNagpduVIr4BRN3_jANcj4DbfYqfyw/exec';

    // ── 비밀번호 로그인 ──
    // 실제 운영 시 이 값을 바꿔주세요
    const ADMIN_PASSWORD_HASH = '5e884898da28047151d0e56f8dc6292773603d0d6aabbdd62a11ef721d1542d8'; // 기본: "password"

    async function hashPassword(pw) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function doLogin() {
      const pw = document.getElementById('passwordInput').value;
      const hash = await hashPassword(pw);
      if (hash === ADMIN_PASSWORD_HASH) {
        localStorage.setItem('adminAuth', '1');
        showDashboard();
      } else {
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('passwordInput').value = '';
      }
    }

    function doLogout() {
      localStorage.removeItem('adminAuth');
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('passwordInput').value = '';
      document.getElementById('loginError').style.display = 'none';
    }

    function showDashboard() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const dd = String(today.getDate()).padStart(2, '0');
      document.getElementById('filterFrom').value = `${yyyy}-${mm}-01`;
      document.getElementById('filterTo').value = `${yyyy}-${mm}-${dd}`;
      loadReports();
    }

    // 세션 유지
    if (localStorage.getItem('adminAuth') === '1') showDashboard();

    // ── 데이터 로드 ──
    let allReports = [];

    async function loadReports() {
      document.getElementById('reportsList').innerHTML = '<div class="loading"><div class="spinner"></div>불러오는 중...</div>';
      try {
        const res = await fetch(SCRIPT_URL + '?action=getReports');
        const data = await res.json();
        if (data.success) {
          allReports = data.reports;
          renderStats(allReports);
          renderReports(allReports);
        } else {
          document.getElementById('reportsList').innerHTML = '<div class="empty">데이터를 불러올 수 없습니다.</div>';
        }
      } catch (e) {
        document.getElementById('reportsList').innerHTML = '<div class="empty">네트워크 오류가 발생했습니다.</div>';
      }
    }

    // ── 통계 ──
    function renderStats(reports) {
      const now = new Date();
      const thisMonth = now.getMonth();
      const thisYear = now.getFullYear();
      const weekAgo = new Date(now - 7 * 86400000);

      const monthReports = reports.filter(r => {
        const d = new Date(r.submitDate);
        return d.getFullYear() === thisYear && d.getMonth() === thisMonth;
      });
      const weekReports = reports.filter(r => new Date(r.submitDate) >= weekAgo);
      const choJangSet = new Set(reports.map(r => r.choJang));

      document.getElementById('statThisMonth').textContent = monthReports.length;
      document.getElementById('statMonthLabel').textContent = `${thisMonth + 1}월`;
      document.getElementById('statThisWeek').textContent = weekReports.length;
    }

    // ── 필터 ──
    function applyFilter() {
      const choJang = document.getElementById('filterChoJang').value;
      const from = document.getElementById('filterFrom').value;
      const to = document.getElementById('filterTo').value;

      let filtered = allReports;
      if (choJang) filtered = filtered.filter(r => r.choJang === choJang);
      if (from) filtered = filtered.filter(r => r.meetingDate >= from);
      if (to) filtered = filtered.filter(r => r.meetingDate <= to);

      renderReports(filtered);
    }

    function resetFilter() {
      document.getElementById('filterChoJang').value = '';
      document.getElementById('filterFrom').value = '';
      document.getElementById('filterTo').value = '';
      renderReports(allReports);
    }

    // ── 렌더링 ──
    function getChojangColor(choJang) {
      if (!choJang) return 'background: #ECEFF1; color: #455A64;';
      const c = String(choJang).trim();
      if (c === '1초장') return 'background: #E3F2FD; color: #1565C0;'; // 파랑
      if (c === '2/3초장' || c === '2-3초장') return 'background: #F3E5F5; color: #7B1FA2;'; // 보라
      if (c === '4초장') return 'background: #FFF3E0; color: #E65100;'; // 주황
      if (c === '5초장') return 'background: #E8F5E9; color: #2E7D32;'; // 초록
      if (c === '6초장') return 'background: #FFEBEE; color: #C62828;'; // 빨강
      return 'background: #ECEFF1; color: #455A64;'; // 회색
    }

    function formatMeetingDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return dateStr;
      const days = ['일', '월', '화', '수', '목', '금', '토'];
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${yyyy}.${mm}.${dd}.(${days[d.getDay()]})`;
    }

    function formatSimpleDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return String(dateStr).substring(0, 10);
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${yyyy}.${mm}.${dd}`;
    }

    function renderReports(reports) {
      document.getElementById('reportsCount').textContent = `총 ${reports.length}건`;
      const list = document.getElementById('reportsList');

      if (reports.length === 0) {
        list.innerHTML = '<div class="empty">📋 조회된 보고서가 없습니다.</div>';
        return;
      }

      // 최신순 정렬
      const sorted = [...reports].sort((a, b) => b.submitDate.localeCompare(a.submitDate));

      list.innerHTML = sorted.map((r, i) => `
        <div class="report-card" id="card-${i}">
          <div class="report-card-header" onclick="toggleCard(${i})">
            <div class="report-card-left">
              <span class="chojang-badge" style="${getChojangColor(r.choJang)}">${r.choJang}</span>
              <div>
                <div class="report-title">${r.shilMulGa}</div>
                <div class="report-meta">${formatMeetingDate(r.meetingDate)} · ${r.meetingPlace}</div>
              </div>
            </div>
            <div class="report-card-right">
              <span class="report-date">${formatSimpleDate(r.submitDate)}</span>
              <span class="expand-arrow">▼</span>
            </div>
          </div>
          <div class="report-card-body">
            <div class="detail-grid">
              <div class="detail-item">
                <label>참석자</label>
                <p>${r.attendees || '—'}</p>
              </div>
              <div class="detail-item">
                <label>불참자 및 사유</label>
                <p>${r.absentees || '없음'}</p>
              </div>
              <div class="detail-item full">
                <label>모임 내용</label>
                <div class="content-chips">
                  ${(r.content || '').split(',').map(c => c.trim()).filter(Boolean).map(c => `<span class="content-chip">${c}</span>`).join('')}
                </div>
              </div>
              ${r.evaluation ? `
              <div class="detail-item full">
                <label>오늘 모임은 어땠나요?</label>
                <p>${r.evaluation}</p>
              </div>` : ''}
              ${r.prayerRequest ? `
              <div class="detail-item full prayer">
                <label>🙏 기도제목</label>
                <p>${r.prayerRequest}</p>
              </div>` : ''}
            </div>
          </div>
        </div>
      `).join('');
    }

    function toggleCard(i) {
      const card = document.getElementById('card-' + i);
      card.classList.toggle('open');
    }
  </script>
</body>
</html>
