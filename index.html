<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쉴물가 모임 보고서</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      background: #f0f4f0;
      min-height: 100vh;
      padding: 24px 16px 48px;
      width: 100%;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      overflow: hidden;
    }

    .header {
      background: #2E7D32;
      color: white;
      border-radius: 12px 12px 0 0;
      padding: 16px 32px 20px;
      text-align: center;
    }

    .header-logo {
      margin-bottom: 8px;
    }

    .header-logo img {
      height: 20px;
      width: auto;
      display: inline-block;
    }

    .header-text h1 {
      font-family: 'Pretendard', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      font-size: 35px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .header-text p {
      font-size: 13px;
      opacity: 0.8;
    }

    @media (max-width: 480px) {
      .header { padding: 12px 20px 16px; }
      .header-text h1 { font-size: 23px; }
      .header-logo img { height: 16px; }
    }

    .form-card {
      background: white;
      border-radius: 0 0 12px 12px;
      padding: 32px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }

    .section-divider {
      border: none;
      border-top: 2px solid #E8F5E9;
      margin: 24px 0 20px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }

    label .required {
      color: #e53935;
      margin-left: 2px;
    }

    input[type="date"],
    input[type="text"],
    input[type="number"],
    select,
    textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: #333;
      background: #fafafa;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #2E7D32;
      box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.12);
      background: white;
    }

    input.error, select.error, textarea.error {
      border-color: #e53935;
    }

    textarea {
      resize: vertical;
      min-height: 90px;
      line-height: 1.6;
    }

    .attendee-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      align-items: center;
    }

    .attendee-row input { flex: 1; margin-bottom: 0; }

    .btn-icon {
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .btn-add { background: #E8F5E9; color: #2E7D32; }
    .btn-add:hover { background: #C8E6C9; }
    .btn-remove { background: #FFEBEE; color: #e53935; }
    .btn-remove:hover { background: #FFCDD2; }

    .btn-add-wrap {
      display: flex;
      justify-content: flex-start;
      margin-top: 6px;
    }

    .btn-add-text {
      background: none;
      border: 1.5px dashed #81C784;
      color: #2E7D32;
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }

    .btn-add-text:hover { background: #E8F5E9; }

    .prayer-box {
      border: 1.5px solid #FFCDD2;
      border-radius: 8px;
      padding: 10px 14px;
      background: #FFF8F8;
      width: 100%;
      min-height: 90px;
      font-size: 14px;
      font-family: inherit;
      color: #333;
      resize: vertical;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      line-height: 1.6;
    }

    .prayer-box:focus {
      border-color: #e53935;
      box-shadow: 0 0 0 3px rgba(229, 57, 53, 0.1);
      background: white;
    }

    .prayer-label { color: #C62828 !important; }

    .submit-btn {
      width: 100%;
      padding: 16px;
      background: #2E7D32;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 28px;
      font-family: inherit;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.03em;
    }

    .submit-btn:hover { background: #1B5E20; }
    .submit-btn:active { transform: scale(0.99); }
    .submit-btn:disabled { background: #aaa; cursor: not-allowed; }

    .toast {
      display: none;
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 14px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      z-index: 1000;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      max-width: 90vw;
      text-align: center;
    }

    .toast.success { background: #2E7D32; }
    .toast.error { background: #c62828; }

    .success-screen {
      display: none;
      text-align: center;
      padding: 48px 24px;
    }

    .success-screen .icon { font-size: 64px; margin-bottom: 16px; }
    .success-screen h2 { color: #2E7D32; margin-bottom: 8px; }
    .success-screen p { color: #666; font-size: 14px; margin-bottom: 24px; }
    .success-screen button {
      background: #2E7D32;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      font-family: inherit;
    }

    .hint {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }

    .form-row-fixed {
      display: grid;
      grid-template-columns: 0.7fr 1fr;
      gap: 8px;
      min-width: 0;
    }

    .form-row-fixed .form-group {
      min-width: 0;
    }

    input[type="date"] {
      -webkit-appearance: none;
      appearance: none;
      display: block;
      width: 100%;
      max-width: 100%;
    }

    @media (max-width: 480px) {
      .form-row { grid-template-columns: 1fr; }
      .form-row-fixed { grid-template-columns: 1fr; }
      .form-card { padding: 24px 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-logo">
        <img src="https://igodswill.org/wp-content/uploads/2025/01/logo02.png" alt="높은뜻푸른교회 로고" />
      </div>
      <div class="header-text">
        <h1>쉴물가 모임 보고서</h1>
        <p>쉴물가 모임 후 보고서를 제출해 주세요</p>
      </div>
    </div>

    <div class="form-card">
      <!-- 성공 화면 -->
      <div class="success-screen" id="successScreen">
        <div class="icon">✅</div>
        <h2>보고서가 제출되었습니다!</h2>
        <p>담당 목사님께 알림 메일이 발송되었습니다.<br>수고하셨습니다 🙏</p>
        <button onclick="resetForm()">새 보고서 작성</button>
      </div>

      <!-- 폼 -->
      <form id="reportForm">

        <div class="form-group">
          <label for="choJang">초장 <span class="required">*</span></label>
          <select id="choJang" required>
            <option value="">선택하세요</option>
            <option value="1초장">1초장</option>
            <option value="2초장">2초장</option>
            <option value="3초장">3초장</option>
            <option value="4초장">4초장</option>
            <option value="5초장">5초장</option>
            <option value="6초장">6초장</option>
          </select>
        </div>

        <div class="form-group">
          <label for="shilMulGa">쉴물가 <span class="required">*</span></label>
          <input type="text" id="shilMulGa" placeholder="예: ○○○ 쉴물가" required />
        </div>

        <div class="form-row-fixed">
          <div class="form-group">
            <label for="meetingDate">모임 날짜 <span class="required">*</span></label>
            <input type="date" id="meetingDate" required />
          </div>

          <div class="form-group">
            <label for="meetingPlace">장소 <span class="required">*</span></label>
            <input type="text" id="meetingPlace" placeholder="예: ○○○ 집, 교회 소그룹실" required />
          </div>
        </div>

        <hr class="section-divider" />

        <div class="form-group">
          <label>참석자 <span class="required">*</span></label>
          <div id="attendeeList">
            <div class="attendee-row">
              <input type="text" placeholder="이름" class="attendee-input" required />
              <button type="button" class="btn-icon btn-remove" onclick="removeAttendee(this)" style="display:none">×</button>
            </div>
          </div>
          <div class="btn-add-wrap">
            <button type="button" class="btn-add-text" onclick="addAttendee()">+ 참석자 추가</button>
          </div>
          <div class="hint">참석 인원수는 자동으로 계산됩니다</div>
        </div>

        <hr class="section-divider" />

        <div class="form-group">
          <label for="absentees">불참인원 및 사유</label>
          <textarea id="absentees" placeholder="예) 김○○ - 출장&#10;이○○ - 건강 문제&#10;(없으면 비워두세요)"></textarea>
        </div>

        <hr class="section-divider" />

        <div class="form-group">
          <label for="content">모임 내용 <span class="required">*</span></label>
          <textarea id="content" style="min-height:120px" placeholder="나눈 말씀, 주요 내용, 특이사항 등을 기록해 주세요" required></textarea>
        </div>

        <hr class="section-divider" />

        <div class="form-group">
          <label for="evaluation">모임 평가 및 건의사항</label>
          <textarea id="evaluation" style="min-height:100px" placeholder="모임에 대한 평가나 건의사항을 자유롭게 적어주세요&#10;(없으면 비워두세요)"></textarea>
        </div>

        <hr class="section-divider" />

        <div class="form-group">
          <label for="prayerRequest" class="prayer-label">🙏 기도제목</label>
          <textarea class="prayer-box" id="prayerRequest" placeholder="기도제목을 적어주세요&#10;(없으면 비워두세요)"></textarea>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">보고서 제출하기</button>
      </form>
    </div>
  </div>

  <!-- 토스트 알림 -->
  <div class="toast" id="toast"></div>

  <script>
    // 입력 필드 포커스 시 키보드에 가리지 않도록 자동 스크롤
    document.addEventListener('focusin', function(e) {
      const el = e.target;
      if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.tagName === 'SELECT') {
        setTimeout(function() {
          el.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'nearest' });
        }, 350);
      }
    });

    // 오늘 날짜로 기본 설정
    document.getElementById('meetingDate').value = new Date().toISOString().split('T')[0];

    function addAttendee() {
      const list = document.getElementById('attendeeList');
      const row = document.createElement('div');
      row.className = 'attendee-row';
      row.innerHTML = `
        <input type="text" placeholder="이름" class="attendee-input" />
        <button type="button" class="btn-icon btn-remove" onclick="removeAttendee(this)">×</button>
      `;
      list.appendChild(row);
      updateRemoveButtons();
      row.querySelector('input').focus();
    }

    function removeAttendee(btn) {
      btn.parentElement.remove();
      updateRemoveButtons();
    }

    function updateRemoveButtons() {
      const rows = document.querySelectorAll('.attendee-row');
      rows.forEach((row, i) => {
        const btn = row.querySelector('.btn-remove');
        btn.style.display = rows.length > 1 ? 'flex' : 'none';
      });
    }

    function getAttendees() {
      const inputs = document.querySelectorAll('.attendee-input');
      return Array.from(inputs).map(i => i.value.trim()).filter(v => v !== '');
    }

    function showToast(msg, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = `toast ${type}`;
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 3500);
    }

    function resetForm() {
      document.getElementById('reportForm').reset();
      document.getElementById('attendeeList').innerHTML = `
        <div class="attendee-row">
          <input type="text" placeholder="이름" class="attendee-input" required />
          <button type="button" class="btn-icon btn-remove" onclick="removeAttendee(this)" style="display:none">×</button>
        </div>`;
      document.getElementById('meetingDate').value = new Date().toISOString().split('T')[0];
      document.getElementById('successScreen').style.display = 'none';
      document.getElementById('reportForm').style.display = 'block';
    }

    document.getElementById('reportForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const attendees = getAttendees();
      if (attendees.length === 0) {
        showToast('참석자를 한 명 이상 입력해 주세요.', 'error');
        return;
      }

      const formData = {
        meetingDate: document.getElementById('meetingDate').value,
        choJang: document.getElementById('choJang').value,
        shilMulGa: document.getElementById('shilMulGa').value.trim(),
        meetingPlace: document.getElementById('meetingPlace').value.trim(),
        attendeeCount: attendees.length,
        attendees: attendees.join(', '),
        absentees: document.getElementById('absentees').value.trim(),
        content: document.getElementById('content').value.trim(),
        evaluation: document.getElementById('evaluation').value.trim(),
        prayerRequest: document.getElementById('prayerRequest').value.trim(),
      };

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = '제출 중...';

      google.script.run
        .withSuccessHandler(function(result) {
          btn.disabled = false;
          btn.textContent = '보고서 제출하기';
          if (result.success) {
            document.getElementById('reportForm').style.display = 'none';
            document.getElementById('successScreen').style.display = 'block';
          } else {
            showToast('오류: ' + result.message, 'error');
          }
        })
        .withFailureHandler(function(err) {
          btn.disabled = false;
          btn.textContent = '보고서 제출하기';
          showToast('제출 실패: ' + err.message, 'error');
        })
        .submitReport(formData);
    });
  </script>
</body>
</html>
